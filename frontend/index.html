<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SisGestão TI — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">
          <img src="assets/logo.png" alt="SisGestão TI" class="login-logo-img" />
        </div>
        <p class="login-subtitle">Sistema de Gestão de Chamados</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <div id="loginError" class="error-message hidden"></div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Entrar
        </button>
      </form>

      <div class="login-hint">
        <strong>Contas de teste:</strong>
        <div class="hint-accounts">
          <span>admin@helpdesk.com / admin123</span>
          <span>ti@helpdesk.com / ti123456</span>
          <span>user@helpdesk.com / user1234</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
