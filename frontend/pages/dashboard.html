<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpdesk</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.png" alt="SisGestão TI" class="sidebar-logo" />
      </div>

      <nav id="sidebarNav" class="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div id="userAvatar" class="user-avatar">?</div>
          <div class="user-details">
            <div id="userName"  class="user-name">—</div>
            <div id="userRole"  class="user-role">—</div>
          </div>
          <button type="button" class="btn-logout" id="btnLogout" title="Sair">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ── MAIN AREA ── -->
    <div class="main-area">
      <header class="main-header">
        <h2 id="pageTitle">Carregando...</h2>
        <div id="headerActions"></div>
      </header>

      <main id="content" class="main-content">
        <div class="empty-state">
          <p>Carregando...</p>
        </div>
      </main>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pages/dashboard-page.js"></script>
  <script src="../js/pages/tickets-page.js"></script>
  <script src="../js/pages/announcements-page.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
