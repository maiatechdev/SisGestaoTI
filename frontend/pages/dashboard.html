<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpdesk</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#3b82f6"/>
          <path d="M20 8C13.373 8 8 13.373 8 20s5.373 12 12 12 12-5.373 12-12S26.627 8 20 8zm0 5a3 3 0 110 6 3 3 0 010-6zm0 17a9 9 0 01-7-3.35C13.04 24.9 16.32 24 20 24s6.96.9 7 2.65A9 9 0 0120 30z" fill="white"/>
        </svg>
        <span>Helpdesk</span>
      </div>

      <nav id="sidebarNav" class="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div id="userAvatar" class="user-avatar">?</div>
          <div class="user-details">
            <div id="userName"  class="user-name">—</div>
            <div id="userRole"  class="user-role">—</div>
          </div>
          <button class="btn-logout" id="btnLogout" title="Sair">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ── MAIN AREA ── -->
    <div class="main-area">
      <header class="main-header">
        <h2 id="pageTitle">Carregando...</h2>
        <div id="headerActions"></div>
      </header>

      <main id="content" class="main-content">
        <div class="empty-state">
          <p>Carregando...</p>
        </div>
      </main>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pages/dashboard-page.js"></script>
  <script src="../js/pages/tickets-page.js"></script>
  <script src="../js/pages/announcements-page.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
